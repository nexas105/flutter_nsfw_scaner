targets:
  $default:
    builders:
      nsfw_detect_gen|nsfw_model:
        enabled: true

builders:
  nsfw_model:
    import: "package:nsfw_detect_gen/builder.dart"
    builder_factories: ["nsfwModelBuilder"]
    build_extensions: { ".dart": [".g.part"] }
    auto_apply: dependents
    build_to: cache
    applies_builders: ["source_gen|combining_builder"]
