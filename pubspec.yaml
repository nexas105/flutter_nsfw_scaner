name: nsfw_detect
description: >-
  Privacy-friendly NSFW detection for Flutter apps. Analyze images, videos,
  picked media, photo libraries, and camera frames on-device.

version: 2.2.0

homepage: https://github.com/nexas105/flutter_nsfw_scaner
repository: https://github.com/nexas105/flutter_nsfw_scaner
issue_tracker: https://github.com/nexas105/flutter_nsfw_scaner/issues
documentation: https://pub.dev/documentation/nsfw_detect/latest/

topics:
  - content-moderation
  - nsfw-detection
  - camera
  - video-scanning
  - permission-handling

funding:
  - https://github.com/sponsors/nexas105

screenshots:
  - description: Gallery view with on-device scan results and badges.
    path: example/assets/screenshots/gallery.png
  - description: Native picker flow scanning user-selected media.
    path: example/assets/screenshots/picker.png
  - description: Live camera scanning with HUD and optional blur.
    path: example/assets/screenshots/camera.png
  - description: Result detail screen with label confidences.
    path: example/assets/screenshots/result-detail.png
  - description: Moderation gate widget blurring NSFW content.
    path: example/assets/screenshots/moderation-gate.png

environment:
  sdk: ^3.4.0
  flutter: '>=3.22.0'

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: NsfwDetectIosPlugin
      android:
        package: com.example.nsfw_detect_ios
        pluginClass: NsfwDetectPlugin
