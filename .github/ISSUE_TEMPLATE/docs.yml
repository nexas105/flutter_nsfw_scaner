name: Documentation issue
description: Report unclear, missing, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link to the README section, pub.dev page, API doc, or example file.
      placeholder: "README > Android setup"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or incorrect?
      description: Describe what should be fixed or added.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording
      description: Optional. Propose replacement text or an example.
